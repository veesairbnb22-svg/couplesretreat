<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f1f5f9;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            border-top: 6px solid #db2777;
        }

        .content {
            padding: 30px;
            color: #334155;
        }

        .h2 {
            color: #0f172a;
            margin-top: 0;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 15px;
        }

        .details {
            margin-top: 20px;
            width: 100%;
            border-collapse: collapse;
        }

        .details th {
            text-align: left;
            padding: 12px;
            background-color: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            width: 140px;
            color: #64748b;
            font-weight: normal;
        }

        .details td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="content">
            <h2 class="h2">New Registration Received</h2>
            <p>A new couple has just registered for the Couples Retreat. Here are their details:</p>

            <table class="details">
                <tr>
                    <th>Husband's Name</th>
                    <td>{{husband_name}}</td>
                </tr>
                <tr>
                    <th>Wife's Name</th>
                    <td>{{wife_name}}</td>
                </tr>
                <tr>
                    <th>Email Address</th>
                    <td><a href="mailto:{{user_email}}">{{user_email}}</a></td>
                </tr>
                <tr>
                    <th>Phone Number</th>
                    <td>{{phone_number}}</td>
                </tr>
            </table>

            <p style="margin-top: 30px; font-size: 13px; color: #94a3b8;">Note: This is an automated notification from
                the registration form.</p>
        </div>
    </div>
</body>

</html>
